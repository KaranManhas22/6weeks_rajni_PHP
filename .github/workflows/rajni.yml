name: kids_learning
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: deploy to vm
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{secrets.IP}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.KEY}}

          script: |
            cd /home/ubuntu/6weeks_rajni_PHP
            git pull origin main
            pm2 delete "Kids Project"
            pm2 start "php -S 0.0.0.0:8001" --name "Kids Project"
